<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polyglot — Universal Translator</title>
  <meta name="description" content="Translate instantly between 100+ languages with Polyglot — a beautiful, lightning-fast universal translator." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ====== BACKGROUND ====== -->
  <div class="bg" aria-hidden="true">
    <div class="mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>
  </div>

  <!-- ====== HEADER ====== -->
  <header class="header">
    <a class="brand" href="#" aria-label="Polyglot home">
      <div class="brand-logo" aria-hidden="true">
        <!-- Translate icon: A → あ -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 0h24v24H0z" fill="none"/>
          <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
        </svg>
      </div>
      <span class="brand-name">Polyglot</span>
    </a>
    <div class="header-right">
      <button id="themeToggle" class="icon-btn theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
        <!-- Sun icon for light mode -->
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <!-- Moon icon for dark mode -->
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div class="live-badge">
        <span class="live-dot" aria-hidden="true"></span>
        <span>Live Translation</span>
      </div>
    </div>
  </header>

  <!-- ====== HERO ====== -->
  <section class="hero" aria-labelledby="hero-heading">
    <div class="hero-eyebrow">
      <span class="eyebrow-icon" aria-hidden="true">✦</span>
      100+ Languages Supported
      <span class="eyebrow-icon" aria-hidden="true">✦</span>
    </div>
    <h1 class="hero-title" id="hero-heading">
      Break Every<br/>
      <span class="gradient-text">Language Barrier</span>
    </h1>
    <p class="hero-sub">
      Type, paste, or detect your text — and watch it transform across tongues in real time.
    </p>
  </section>

  <!-- ====== TRANSLATOR ====== -->
  <main class="translator" id="translator">

    <!-- TRANSLATE CARD -->
    <div class="card">

      <!-- LANGUAGE BAR -->
      <div class="lang-bar">
        <div class="lang-slot">
          <label class="lang-label" for="sourceLang">From</label>
          <div class="select-wrap">
            <select id="sourceLang" aria-label="Source language"></select>
            <span class="select-arrow" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </span>
          </div>
        </div>

        <button id="swap" class="swap-btn" title="Swap languages" aria-label="Swap source and target languages">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/>
          </svg>
        </button>

        <div class="lang-slot lang-slot-right">
          <label class="lang-label" for="targetLang">To</label>
          <div class="select-wrap">
            <select id="targetLang" aria-label="Target language"></select>
            <span class="select-arrow" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </span>
          </div>
        </div>
      </div>

      <!-- DIVIDER -->
      <div class="card-divider" aria-hidden="true"></div>

      <!-- PANELS -->
      <div class="panels">

        <!-- SOURCE PANEL -->
        <div class="panel panel-src">
          <textarea
            id="input"
            placeholder="Start typing to translate…"
            maxlength="500"
            autofocus
            spellcheck="true"
            aria-label="Text to translate"
          ></textarea>
          <div class="panel-foot">
            <button class="icon-btn" id="speakSrc" title="Read aloud" aria-label="Speak source text">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <span id="counter" class="counter">0 / 500</span>
          </div>
        </div>

        <!-- VERTICAL DIVIDER -->
        <div class="panel-divider" aria-hidden="true"></div>

        <!-- TARGET PANEL -->
        <div class="panel panel-tgt">
          <div class="output-wrap">
            <textarea
              id="output"
              placeholder="Translation appears here…"
              readonly
              spellcheck="false"
              aria-label="Translation output"
              aria-live="polite"
            ></textarea>
            <div id="loader" class="loader hidden" role="status" aria-label="Translating">
              <div class="loader-dots">
                <span></span><span></span><span></span>
              </div>
            </div>
          </div>
          <div class="panel-foot">
            <div class="tgt-actions">
              <button class="icon-btn" id="speakTgt" title="Read aloud" aria-label="Speak translation">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              </button>
              <button class="icon-btn" id="copy" title="Copy translation" aria-label="Copy translation text">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
              </button>
            </div>
            <span id="err" class="error" role="alert"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- QUICK PHRASES -->
    <div class="chips-section">
      <span class="chips-label">Quick phrases</span>
      <div class="chips" role="list">
        <button class="chip" role="listitem">Hello, how are you?</button>
        <button class="chip" role="listitem">Where is the train station?</button>
        <button class="chip" role="listitem">Thank you very much</button>
        <button class="chip" role="listitem">I love this city</button>
        <button class="chip" role="listitem">Good morning!</button>
        <button class="chip" role="listitem">How much does it cost?</button>
      </div>
    </div>

    <p id="status" class="status" aria-live="polite"></p>

  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 0h24v24H0z" fill="none"/>
            <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
          </svg>
        </div>
        <span>Polyglot</span>
      </div>
      <p class="footer-copy">© 2026 Abdur Rajjak · Crafted with HTML, CSS &amp; JS</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
