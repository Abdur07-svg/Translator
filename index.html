<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumen Translate — Animated Universal Translator</title>
<meta name="description" content="Translate between 100+ languages with a beautifully animated, fast translator." />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="grid-overlay"></div>
        <div class="vignette"></div>
    </div>

    <!-- ====== HEADER ====== -->
    <header class="header">
        <div class="brand">
            <div class="brand-icon" aria-hidden="true">🌐</div>
            <div>
                <div class="brand-name">Lumen Translate</div>
                <div class="brand-sub">100+ languages · instant</div>
            </div>
        </div>
        <div class="header-badge">
            <span class="dot" aria-hidden="true"></span>
            neural translation
        </div>
    </header>

    <!-- ====== HERO ====== -->
    <section class="hero">
        <h1 class="hero-title">Speak Every Language</h1>
        <p class="hero-sub">Type, paste, or detect — and watch your words fluidly cross borders.</p>
    </section>

    <!-- ====== TRANSLATOR ====== -->
    <section class="translator">
        <div class="card">
            <div class="panels">

                <!-- SOURCE -->
                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-label">From</span>
                        <select id="sourceLang" aria-label="Source language"></select>
                    </div>
                    <textarea id="input" placeholder="Type something to translate…" maxlength="500" autofocus spellcheck="true"></textarea>
                    <div class="panel-foot">
                        <div class="actions">
                            <button class="icon-btn" id="speakSrc" title="Speak source" aria-label="Speak source text">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                            </button>
                        </div>
                        <span id="counter" class="counter">0 / 500</span>
                    </div>
                </div>

                <!-- SWAP -->
                <div class="swap-wrap">
                    <button id="swap" class="swap-btn" title="Swap languages" aria-label="Swap languages">⇄</button>
                </div>

                <!-- TARGET -->
                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-label">To</span>
                        <select id="targetLang" aria-label="Target language"></select>
                    </div>
                    <div class="output-wrap">
                        <textarea id="output" placeholder="Translation appears here…" readonly spellcheck="false"></textarea>
                        <div id="loader" class="loader hidden">
                            <div class="loader-inner">
                                <span class="spinner" aria-hidden="true"></span>
                                translating…
                            </div>
                        </div>
                    </div>
                    <div class="panel-foot">
                        <div class="actions">
                            <button class="icon-btn" id="speakTgt" title="Speak translation" aria-label="Speak translation text">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                            </button>
                            <button class="icon-btn" id="copy" title="Copy translation" aria-label="Copy translation">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                            </button>
                        </div>
                        <span id="err" class="error"></span>
                    </div>
                </div>

            </div>
        </div>

        <!-- CHIPS -->
        <div class="chips">
            <button class="chip">Hello, how are you?</button>
            <button class="chip">Where is the train station?</button>
            <button class="chip">Thank you very much</button>
            <button class="chip">I love this city</button>
        </div>

        <p id="status" class="status"></p>
    </section>

    <!-- ====== FOOTER ====== -->
    <footer>
        <div class="footer-content">
            <div class="footer-brand">AR7</div>
            <p class="footer-text">© 2026 Abdur Rajjak · Built with love using HTML, CSS &amp; JS.</p>
        </div>
    </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>
</body>
</html>
